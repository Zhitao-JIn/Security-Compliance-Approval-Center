
server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:h2:file:~/auth_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  # 密钥：生产环境请使用 256 位以上的强随机密钥，至少 32 个字符
  secret: your-256-bit-secret-key-at-least-32-chars-long
  # 过期时间：7 天（单位：毫秒）
  expiration: 604800000